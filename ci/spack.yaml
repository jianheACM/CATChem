# Spack environment file to build CATChem dependencies
spack:
  packages:
    all:
      compiler: [oneapi, gcc@13.13, apple-clang@14]
  specs:
  - netcdf-c@4.9.2
  - netcdf-fortran@4.6.1
  - bacio@2.4.1
  - g2@3.5.1
  - ip@5.1.0 precision=d
  - sp@2.5.0
  - nemsio@2.5.4
  - w3emc@2.10.0
  - sigio@2.3.3
  - nccmp@1.9.0.1
  - parallelio@2.5.10+fortran~pnetcdf
  - esmf@8.8.0
  view: true
  concretizer:
    unify: when_possible
