# YSU Vertical Dispersion Process Generation Configuration
# For use with catchem_generate_process.py

name: "ysuverticaldispersion"
type: "transport"
description: "Yonsei University boundary layer scheme for vertical mixing of tracers"
author: "CATChem Development Team"

# Multiple schemes for different YSU variants
schemes:
  - "standardYSU"
  - "enhancedYSU"
  - "scaleAwareYSU"

# Multi-phase support (not needed for transport)
multi_phase: false

# Solver type (not applicable for transport)
solver_type: "implicit"

# Species list (will be read dynamically from config)
species: []

# Process-specific metadata
process_category: "transport"
process_phase: "transport"
computational_complexity: "O(nx*ny*nz)"
memory_requirements: "O(nx*ny*nz*nspecies)"

# Dependencies
state_dependencies:
  - "met_state"
  - "chem_state"

# Common methods for transport processes
common_methods:
  - "validate_transport_inputs"
  - "calculate_mixing_coefficients"
  - "diagnose_pbl_height"
  - "apply_vertical_mixing"
  - "update_transport_state"

# Diagnostic outputs
diagnostics:
  - "mixing_coefficients"
  - "pbl_height"
  - "mixing_length"
  - "turbulent_fluxes"
  - "entrainment_rate"

# Integration settings
integration:
  process_phase: "transport"
  dependencies: ["meteorology", "grid_setup"]
  compatibility: ["fv3_coordinates", "column_processing"]
