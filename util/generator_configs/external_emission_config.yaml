# External Emission Process Configuration for CATChem Process Generator


name: "ExternalEmission"
type: "emission"
description: "External emission process for applying emission tendencies from driver-loaded data"
author: "CATChem Development Team"
year: 2025

# Simple scheme - external emissions just apply tendencies
schemes:
  - "default"  # Single scheme: apply emission tendencies to species

# NOTE: NO hardcoded species list!
# Species are dynamically configured via YAML config at runtime
# The process uses EmissionConfigValidator to validate species mapping

# Runtime configuration
runtime_config:
  validate_species_at_init: true
  use_column_processing: true
  enable_diagnostics: true
  error_on_missing_species: false  # Use warnings instead

# Integration with CATChem architecture
integration:
  state_container: true
  grid_manager: true
  error_manager: true
  diagnostic_manager: true

# What this process does:
# 1. Driver reads external emission data (NetCDF, CSV, etc.)
# 2. Driver provides emission rates through StateContainer
# 3. Process applies emission rates as tendencies: dC/dt += emission_rate
# 4. Process accumulates emissions in EmisState for diagnostics
# 5. EmissionConfigValidator handles dynamic species mapping
