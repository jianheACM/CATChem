# YSU Vertical Dispersion Process Configuration
# Yonsei University Boundary Layer Scheme for Tracer Transport
# Modern, dynamic configuration with no hardcoded species


name: "ysuverticaldispersion"
display_name: "YSU Vertical Dispersion"
version: "1.0.0"
description: "Yonsei University boundary layer scheme for vertical mixing of tracers"
category: "transport"
phase: "transport"
authors: ["CATChem Development Team"]
references:
  - "Noh et al. (2003) - Improvement of the K-profile model for the planetary boundary layer"
  - "Hong et al. (2006) - A new vertical diffusion package with an explicit treatment of entrainment processes"
documentation: "Implementation of YSU scheme for tracer vertical mixing in atmospheric columns"

# Input/Output field specifications
io_specification:
  inputs:
    meteorology:
      - name: "temperature"
        description: "Air temperature profile"
        units: "K"
        dimensions: ["nx", "ny", "nz"]
        required: true

      - name: "pressure"
        description: "Pressure profile"
        units: "Pa"
        dimensions: ["nx", "ny", "nz"]
        required: true

      - name: "wind_u"
        description: "Zonal wind component"
        units: "m/s"
        dimensions: ["nx", "ny", "nz"]
        required: true

      - name: "wind_v"
        description: "Meridional wind component"
        units: "m/s"
        dimensions: ["nx", "ny", "nz"]
        required: true

      - name: "surface_pressure"
        description: "Surface pressure"
        units: "Pa"
        dimensions: ["nx", "ny"]
        required: true

      - name: "surface_roughness"
        description: "Surface roughness length"
        units: "m"
        dimensions: ["nx", "ny"]
        required: false
        default_value: 0.1

      - name: "surface_heat_flux"
        description: "Surface sensible heat flux"
        units: "W/m^2"
        dimensions: ["nx", "ny"]
        required: false
        default_value: 0.0

      - name: "surface_moisture_flux"
        description: "Surface latent heat flux"
        units: "W/m^2"
        dimensions: ["nx", "ny"]
        required: false
        default_value: 0.0

    tracers:
      - name: "concentrations"
        description: "Tracer concentrations (all species)"
        units: "kg/kg or mol/mol"
        dimensions: ["nx", "ny", "nz", "nspecies"]
        required: true

  outputs:
    tracers:
      - name: "concentrations"
        description: "Updated tracer concentrations after vertical mixing"
        units: "kg/kg or mol/mol"
        dimensions: ["nx", "ny", "nz", "nspecies"]

    diagnostics:
      - name: "mixing_coefficients"
        description: "Vertical mixing coefficients (K-profile)"
        units: "m^2/s"
        dimensions: ["nx", "ny", "nz"]

      - name: "pbl_height"
        description: "Planetary boundary layer height"
        units: "m"
        dimensions: ["nx", "ny"]

      - name: "mixing_length"
        description: "Mixing length scale"
        units: "m"
        dimensions: ["nx", "ny", "nz"]

      - name: "turbulent_fluxes"
        description: "Vertical turbulent fluxes for all tracers"
        units: "kg/m^2/s or mol/m^2/s"
        dimensions: ["nx", "ny", "nz", "nspecies"]

      - name: "entrainment_rate"
        description: "Entrainment rate at PBL top"
        units: "m/s"
        dimensions: ["nx", "ny"]

# Process configuration parameters
configuration:
  scheme_options:
    ysu_scheme_opt:
      description: "YSU scheme variant selection"
      type: "integer"
      default: 1
      valid_values: [1, 2, 3]
      value_descriptions:
        1: "Original YSU scheme"
        2: "Modified YSU with enhanced entrainment"
        3: "YSU with scale-aware modifications"

    pbl_physics_opt:
      description: "PBL physics option"
      type: "integer"
      default: 1
      valid_values: [1, 2]
      value_descriptions:
        1: "Standard mixing"
        2: "Enhanced mixing for tracers"

  physical_parameters:
    von_karman_constant:
      description: "von Karman constant"
      type: "real"
      default: 0.4
      units: "dimensionless"

    critical_richardson:
      description: "Critical Richardson number for stability"
      type: "real"
      default: 0.25
      units: "dimensionless"

    prandtl_number:
      description: "Turbulent Prandtl number"
      type: "real"
      default: 1.0
      units: "dimensionless"

    mixing_length_scale:
      description: "Characteristic mixing length scale"
      type: "real"
      default: 150.0
      units: "m"

    entrainment_efficiency:
      description: "Entrainment efficiency parameter"
      type: "real"
      default: 0.2
      units: "dimensionless"

    minimum_mixing_coeff:
      description: "Minimum vertical mixing coefficient"
      type: "real"
      default: 0.1
      units: "m^2/s"

    maximum_mixing_coeff:
      description: "Maximum vertical mixing coefficient"
      type: "real"
      default: 1000.0
      units: "m^2/s"

  numerical_parameters:
    vertical_levels:
      description: "Number of vertical levels"
      type: "integer"
      default: 72

    time_step:
      description: "Process time step"
      type: "real"
      default: 3600.0
      units: "s"

    implicit_solver:
      description: "Use implicit solver for stability"
      type: "logical"
      default: true

    convergence_criteria:
      description: "Convergence criteria for implicit solver"
      type: "real"
      default: 1.0e-6
      units: "relative"

    max_iterations:
      description: "Maximum iterations for implicit solver"
      type: "integer"
      default: 20

    diffusion_limiter:
      description: "Apply flux limiter for numerical stability"
      type: "logical"
      default: true

# Diagnostic configuration
diagnostics:
  standard_diagnostics:
    - "mixing_coefficients"
    - "pbl_height"
    - "mixing_length"
    - "turbulent_fluxes"
    - "entrainment_rate"

  optional_diagnostics:
    - "richardson_number"
    - "stability_parameter"
    - "friction_velocity"
    - "obukhov_length"
    - "convective_velocity"
    - "surface_layer_fluxes"

  output_frequency:
    description: "Diagnostic output frequency"
    type: "string"
    default: "every_timestep"
    valid_values: ["every_timestep", "hourly", "daily", "final_only"]

# Validation and constraints
validation:
  physical_constraints:
    temperature_range: [150.0, 350.0]  # K
    pressure_range: [1000.0, 110000.0]  # Pa
    wind_speed_max: 100.0  # m/s

  numerical_constraints:
    cfl_condition: true
    mass_conservation: true
    positive_definite: true

  error_handling:
    invalid_input_action: "warn_and_use_default"
    numerical_failure_action: "reduce_timestep"
    mass_violation_action: "renormalize"

# Performance and optimization
performance:
  vectorization:
    enable: true
    preferred_loop_order: ["k", "j", "i"]  # Vertical first for column operations

  parallelization:
    openmp_enabled: true
    thread_private_variables: ["work_arrays", "diagnostics"]

  memory_optimization:
    reuse_work_arrays: true
    minimize_temporary_storage: true

  column_optimization:
    enable_column_batching: true
    preferred_batch_size: 64

# Testing and validation
testing:
  unit_tests:
    - "test_mixing_coefficient_calculation"
    - "test_pbl_height_diagnosis"
    - "test_implicit_solver"
    - "test_mass_conservation"
    - "test_numerical_stability"

  integration_tests:
    - "test_column_mixing_profiles"
    - "test_diurnal_cycle_response"
    - "test_stable_unstable_conditions"

  benchmark_cases:
    - "neutral_boundary_layer"
    - "convective_boundary_layer"
    - "stable_boundary_layer"
    - "transition_periods"

# Example usage and initialization
example_usage:
  description: "Typical YSU vertical dispersion setup for tracer transport"
  configuration_example:
    ysu_scheme_opt: 1
    pbl_physics_opt: 1
    von_karman_constant: 0.4
    critical_richardson: 0.25
    implicit_solver: true
    time_step: 3600.0

  input_example:
    meteorology: "Standard atmospheric profile with realistic wind/temperature"
    tracers: "Multi-species concentrations for atmospheric chemistry"

  expected_output:
    mixed_concentrations: "Vertically mixed tracer profiles"
    pbl_diagnostics: "Boundary layer height and mixing parameters"

# Integration with CATChem
catchem_integration:
  process_phase: "transport"
  dependencies: ["meteorology", "grid_setup"]
  compatibility: ["fv3_coordinates", "column_processing"]
  memory_requirements: "O(nx*ny*nz*nspecies) + diagnostics"
  computational_complexity: "O(nx*ny*nz) per timestep"
