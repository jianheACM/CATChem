# CATChem Dry Deposition Process Configuration
# This configuration will refactor the existing drydep process using the new architecture

name: "DryDep"
type: "loss"
description: "Dry deposition process for atmospheric species removal through surface deposition"
author: "CATChem Development Team"

# Multi-phase configuration (if needed for future extensions)
multi_phase: false

# Scheme configuration based on existing implementation
schemes:
  - "GOCART"
  - "Wesely"

# Additional configuration for dry deposition
configuration:
  supports_resuspension: true
  default_scheme: "GOCART"
  applicable_species:
    - "aerosol"
    - "gas"  # for future extension
  surface_types:
    - "land"
    - "water"
    - "ice"
  particle_properties:
    - "radius"
    - "density"
