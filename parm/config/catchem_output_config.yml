# CATChem NUOPC Diagnostic Output Configuration
# This file defines the NetCDF output settings and fields for diagnostic output

output_settings:
  # Output frequency and timing
  output_frequency: "1h"           # Output frequency (e.g., "1h", "30m", "1d")
  output_start_time: "simulation"  # When to start output ("simulation", "YYYY-MM-DD HH:MM:SS")

  # File naming and organization
  filename_template: "CATChem_diag_%Y%m%d_%H%M%S.nc"
  output_directory: "./output"
  split_by_time: true              # Create separate files for each output time
  max_records_per_file: 24        # Maximum time records per file (if not split_by_time)

  # NetCDF format and compression
  netcdf_format: "NETCDF4_CLASSIC" # NETCDF4, NETCDF4_CLASSIC, or CLASSIC
  compression_level: 4             # 0-9, 0=no compression, 9=max compression
  shuffle: true                    # Enable shuffle filter for better compression

  # CF Convention compliance
  cf_conventions: "CF-1.8"
  institution: "NOAA/OAR/ESRL/CSL"
  source: "CATChem atmospheric chemistry model"
  references: "https://github.com/NOAA-OWP/CATChem"
  comment: "CATChem diagnostic output from NUOPC coupling"

# Coordinate variables (automatically included)
coordinates:
  longitude:
    standard_name: "longitude"
    long_name: "longitude"
    units: "degrees_east"
    axis: "X"

  latitude:
    standard_name: "latitude"
    long_name: "latitude"
    units: "degrees_north"
    axis: "Y"

  level:
    standard_name: "atmosphere_hybrid_sigma_pressure_coordinate"
    long_name: "hybrid sigma-pressure coordinate"
    units: "1"
    axis: "Z"
    positive: "down"
    formula_terms: "sigma: sigma ap: ap b: b ps: ps"

  time:
    standard_name: "time"
    long_name: "time"
    units: "seconds since 1970-01-01 00:00:00 UTC"
    calendar: "gregorian"
    axis: "T"

# Diagnostic fields to output
diagnostic_fields:
  n_fields: 15

  field_1:
    variable_name: "O3"
    standard_name: "mass_fraction_of_ozone_in_air"
    long_name: "Ozone mass fraction"
    catchem_var: "ChemState%Species%O3"
    dimensions: 3
    units: "kg kg-1"
    cell_methods: "time: mean"
    coordinates: "longitude latitude level"

  field_2:
    variable_name: "NO2"
    standard_name: "mass_fraction_of_nitrogen_dioxide_in_air"
    long_name: "Nitrogen dioxide mass fraction"
    catchem_var: "ChemState%Species%NO2"
    dimensions: 3
    units: "kg kg-1"
    cell_methods: "time: mean"
    coordinates: "longitude latitude level"

  field_3:
    variable_name: "CO"
    standard_name: "mass_fraction_of_carbon_monoxide_in_air"
    long_name: "Carbon monoxide mass fraction"
    catchem_var: "ChemState%Species%CO"
    dimensions: 3
    units: "kg kg-1"
    cell_methods: "time: mean"
    coordinates: "longitude latitude level"

  field_4:
    variable_name: "NO"
    standard_name: "mass_fraction_of_nitrogen_monoxide_in_air"
    long_name: "Nitrogen monoxide mass fraction"
    catchem_var: "ChemState%Species%NO"
    dimensions: 3
    units: "kg kg-1"
    cell_methods: "time: mean"
    coordinates: "longitude latitude level"
    optional: true

  field_5:
    variable_name: "SO2"
    standard_name: "mass_fraction_of_sulfur_dioxide_in_air"
    long_name: "Sulfur dioxide mass fraction"
    catchem_var: "ChemState%Species%SO2"
    dimensions: 3
    units: "kg kg-1"
    cell_methods: "time: mean"
    coordinates: "longitude latitude level"
    optional: true

  field_6:
    variable_name: "DUST"
    standard_name: "mass_fraction_of_dust_dry_aerosol_particles_in_air"
    long_name: "Dust aerosol mass fraction"
    catchem_var: "ChemState%Species%DUST"
    dimensions: 3
    units: "kg kg-1"
    cell_methods: "time: mean"
    coordinates: "longitude latitude level"

  field_7:
    variable_name: "SEAS"
    standard_name: "mass_fraction_of_sea_salt_dry_aerosol_particles_in_air"
    long_name: "Sea salt aerosol mass fraction"
    catchem_var: "ChemState%Species%SEAS"
    dimensions: 3
    units: "kg kg-1"
    cell_methods: "time: mean"
    coordinates: "longitude latitude level"

  field_8:
    variable_name: "dust_dd"
    standard_name: "tendency_of_atmosphere_mass_content_of_dust_dry_aerosol_particles_due_to_dry_deposition"
    long_name: "Dust dry deposition flux"
    catchem_var: "DiagState%DustDryDep"
    dimensions: 2
    units: "kg m-2 s-1"
    cell_methods: "time: mean"
    coordinates: "longitude latitude"

  field_9:
    variable_name: "seas_dd"
    standard_name: "tendency_of_atmosphere_mass_content_of_sea_salt_dry_aerosol_particles_due_to_dry_deposition"
    long_name: "Sea salt dry deposition flux"
    catchem_var: "DiagState%SeasDryDep"
    dimensions: 2
    units: "kg m-2 s-1"
    cell_methods: "time: mean"
    coordinates: "longitude latitude"

  field_10:
    variable_name: "o3_dd"
    standard_name: "tendency_of_atmosphere_mass_content_of_ozone_due_to_dry_deposition"
    long_name: "Ozone dry deposition flux"
    catchem_var: "DiagState%O3DryDep"
    dimensions: 2
    units: "kg m-2 s-1"
    cell_methods: "time: mean"
    coordinates: "longitude latitude"
    optional: true

  field_11:
    variable_name: "dust_emis"
    standard_name: "tendency_of_atmosphere_mass_content_of_dust_dry_aerosol_particles_due_to_emission"
    long_name: "Dust emission flux"
    catchem_var: "EmisState%DustEmission"
    dimensions: 2
    units: "kg m-2 s-1"
    cell_methods: "time: mean"
    coordinates: "longitude latitude"

  field_12:
    variable_name: "seas_emis"
    standard_name: "tendency_of_atmosphere_mass_content_of_sea_salt_dry_aerosol_particles_due_to_emission"
    long_name: "Sea salt emission flux"
    catchem_var: "EmisState%SeasEmission"
    dimensions: 2
    units: "kg m-2 s-1"
    cell_methods: "time: mean"
    coordinates: "longitude latitude"

  field_13:
    variable_name: "pbl_height"
    standard_name: "atmosphere_boundary_layer_thickness"
    long_name: "Planetary boundary layer height"
    catchem_var: "MetState%PBL_Height"
    dimensions: 2
    units: "m"
    cell_methods: "time: mean"
    coordinates: "longitude latitude"

  field_14:
    variable_name: "surface_temp"
    standard_name: "surface_temperature"
    long_name: "Surface temperature"
    catchem_var: "MetState%SkinTemperature"
    dimensions: 2
    units: "K"
    cell_methods: "time: mean"
    coordinates: "longitude latitude"

  field_15:
    variable_name: "surface_pressure"
    standard_name: "air_pressure_at_mean_sea_level"
    long_name: "Surface pressure"
    catchem_var: "MetState%SurfacePressure"
    dimensions: 2
    units: "Pa"
    cell_methods: "time: mean"
    coordinates: "longitude latitude"

# Field aggregation settings
aggregation:
  time_averaging: true             # Enable time averaging
  spatial_aggregation: false      # Enable spatial aggregation (e.g., regional means)

  # Time averaging options
  averaging_period: "1h"          # Period for time averaging
  output_instantaneous: false     # Also output instantaneous values

  # Statistics to compute (if enabled)
  compute_statistics:
    mean: true
    min: false
    max: false
    std: false

# Parallel I/O settings
parallel_io:
  use_esmf_io: true               # Use ESMF I/O capabilities
  collective_io: true             # Use collective I/O operations
  io_root_rank: 0                 # Root rank for I/O operations

  # ESMF RegridStore settings for output grid
  output_on_native_grid: true     # Output on model's native grid
  regrid_to_output_grid: false    # Regrid to a different output grid

  # Output grid specification (if regrid_to_output_grid = true)
  output_grid:
    type: "regular_lonlat"        # regular_lonlat, gaussian, etc.
    lon_resolution: 1.0           # degrees
    lat_resolution: 1.0           # degrees
    lon_range: [-180.0, 180.0]
    lat_range: [-90.0, 90.0]
