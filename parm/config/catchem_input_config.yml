# Regridding configuration
regrid_settings:
  # Global defaults (used when dataset doesn't specify regrid_options)
  default_method: "bilinear"         # Default regridding method
  pole_method: "none"                # Pole treatment: none, teeth, avg
  unmapped_action: "error"           # error, ignore

  # Field-level override capability
  # Fields can override dataset regrid settings by specifying explicit methods:
  # - regrid_method: "inherit"     -> Use dataset regrid_options
  # - regrid_method: "bilinear"    -> Override with bilinear
  # - regrid_method: "conservative" -> Override with conservative
  # - regrid_method: "nearest_neighbor" -> Override with nearest neighbor

  # Conservative regridding options
  conservative_order: 1              # 1 or 2
  conservative_frac_area: true       # Use fractional areas

  # Quality control
  check_conservation: true           # Check mass conservation for conservative
  conservation_tolerance: 1.0e-6     # Tolerance for conservation check

  # Caching
  cache_weights: true                # Cache regridding weights
  weights_cache_dir: "./weights"     # Directory for cached weights

# Time management
time_management:
  # Refresh scheduling
  check_refresh_frequency: "hourly"  # How often to check for refresh
  max_forecast_hours: 168            # Maximum forecast hours to keep
  min_history_hours: 24              # Minimum history hours to keep

  # File management
  cleanup_old_files: true            # Clean up old cached files
  max_cache_size_gb: 10              # Maximum cache size in GB

  # Time coordinate handling
  time_units_standard: "seconds since 1970-01-01 00:00:00 UTC"
  calendar_standard: "gregorian"

  # Leap year handling
  handle_leap_years: true            # Handle leap years properly
  leap_day_treatment: "interpolate"  # interpolate, skip, error

# Quality control and validation
validation:
  # CF compliance checking
  check_cf_compliance: true          # Check CF compliance
  check_coordinate_vars: true        # Validate coordinate variables
  check_bounds: true                 # Check coordinate bounds

  # Data validation
  check_data_ranges: true            # Check reasonable data ranges
  check_missing_values: true         # Validate missing value handling
  check_units: true                  # Validate unit consistency

  # Physical constraints
  enforce_positive_species: true     # Enforce positive species concentrations
  enforce_positive_emissions: true   # Enforce positive emissions

  # Data range validation (optional)
  data_ranges:
    emissions:
      min_value: 0.0
      max_value: 1.0e-6              # kg m-2 s-1
    concentrations:
      min_value: 0.0
      max_value: 1.0e-3              # kg kg-1

# Logging and diagnostics
logging:
  log_level: "INFO"                  # DEBUG, INFO, WARNING, ERROR
  log_file: "catchem_input.log"      # Log file name
  log_to_stdout: true                # Also log to standard output

  # Diagnostic output
  output_regrid_diagnostics: false   # Output regridding diagnostics
  output_time_series: false          # Output time series of input data
  diagnostics_directory: "./diagnostics"

# Performance settings
performance:
  # Parallel I/O
  use_parallel_io: true              # Use parallel NetCDF I/O
  io_decomposition: "2d"             # 1d, 2d, or auto

  # Memory management
  preload_datasets: false            # Preload entire datasets into memory
  memory_limit_gb: 4                 # Memory limit for input data

  # Threading
  use_openmp: true                   # Use OpenMP for regridding
  max_threads: 4                     # Maximum OpenMP threads
