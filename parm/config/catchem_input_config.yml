# CATChem NUOPC CF Data Input Configuration
# This file defines the CF-compliant input data settings and variables for CATChem

input_settings:
  # General input settings
  enable_cf_input: true              # Enable CF data input system
  input_directory: "./input_data"    # Base directory for input files
  cache_directory: "./cache"         # Directory for cached/regridded data

  # Error handling
  strict_cf_compliance: true         # Require strict CF compliance
  allow_missing_fields: false       # Allow missing optional fields
  fill_missing_with_default: true   # Fill missing values with defaults

  # Regridding settings
  regrid_method: "bilinear"          # bilinear, conservative, nearest_neighbor
  cache_regridded_data: true         # Cache regridded data for reuse
  regrid_extrap_method: "nearest"    # nearest, creep, none

  # Time interpolation
  time_interp_method: "linear"       # linear, nearest, cubic
  time_extrap_method: "constant"     # constant, linear, none

# Input datasets configuration
datasets:
  n_datasets: 3

  dataset_1:
    name: "emissions"
    description: "Anthropogenic emissions dataset"
    file_template: "emissions_%Y%m%d.nc"
    time_frequency: "daily"
    refresh_template:
      frequency: "daily"
      offset_hours: 0
      lookahead_days: 1
      lookback_days: 0
    coordinate_mapping:
      longitude: "lon"
      latitude: "lat"
      time: "time"
      level: "lev"
    regrid_options:
      method: "conservative"           # Emissions should preserve mass
      pole_method: "none"
      unmapped_action: "error"
      conservative_order: 1
      conservative_frac_area: true
      check_conservation: true
      conservation_tolerance: 1.0e-8   # Stricter for emissions
      cache_weights: true
      extrap_method: "nearest"
      # Weight file options - use pre-computed weights for faster startup
      weight_file: "./weights/emissions_conservative_weights.nc"  # Explicit weight file
      # weight_file_template: "./weights/{DATASET}_{METHOD}_weights.nc"  # Alternative: template
      save_weights: true               # Save weights if computing them

  dataset_2:
    name: "boundary_conditions"
    description: "Chemical boundary conditions"
    file_template: "bcon_%Y%m%d_%H.nc"
    time_frequency: "6hourly"
    refresh_template:
      frequency: "6hourly"
      offset_hours: 0
      lookahead_hours: 12
      lookback_hours: 6
    coordinate_mapping:
      longitude: "longitude"
      latitude: "latitude"
      time: "time"
      level: "hybrid"
    regrid_options:
      method: "bilinear"               # Smooth interpolation for boundaries
      pole_method: "avg"               # Better pole handling for global data
      unmapped_action: "ignore"        # May have missing boundary points
      extrap_method: "nearest"
      cache_weights: true
      check_conservation: false        # Not critical for boundary data
      # Weight file options for boundary conditions
      weight_file_template: "./weights/bcon_{METHOD}_{POLE_METHOD}_weights.nc"
      save_weights: true               # Save computed weights for reuse

  dataset_3:
    name: "initial_conditions"
    description: "Initial chemical conditions"
    file_template: "ics_%Y%m%d_%H.nc"
    time_frequency: "once"
    refresh_template:
      frequency: "simulation_start"
      offset_hours: 0
    coordinate_mapping:
      longitude: "lon"
      latitude: "lat"
      time: "time"
      level: "lev"
    regrid_options:
      method: "bilinear"               # Smooth interpolation for initial fields
      pole_method: "avg"
      unmapped_action: "error"         # Initial conditions must be complete
      extrap_method: "creep"           # Allow some extrapolation for ICs
      cache_weights: true
      check_conservation: false        # Not critical for initial conditions
      # Weight file options for initial conditions
      weight_file_template: "./weights/ics_{METHOD}_{EXTRAP_METHOD}_weights.nc"
      save_weights: true               # Save computed weights for reuse
      special_handling:
        enforce_positive: true         # Ensure positive concentrations
        apply_floor_values: true       # Apply minimum concentration floors

# Input fields configuration
input_fields:
  n_fields: 12

  field_1:
    variable_name: "NO_emis"
    dataset: "emissions"
    cf_standard_name: "tendency_of_atmosphere_mass_content_of_nitrogen_monoxide_due_to_emission"
    cf_long_name: "Nitrogen monoxide emission flux"
    cf_units: "kg m-2 s-1"
    target_var: "EmisState%NOEmission"
    dimensions: 2
    required: true
    regrid_method: "inherit"           # Use dataset regrid options
    time_interpolation: true
    unit_conversion:
      from_units: "kg m-2 s-1"
      to_units: "kg m-2 s-1"
      scale_factor: 1.0

  field_2:
