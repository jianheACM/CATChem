# CATChem NUOPC Field Configuration
# This file defines the mapping between NUOPC standard names and CATChem variables

import_fields:
  n_fields: 16

  field_1:
    standard_name: "air_temperature"
    catchem_var: "MetState%Temperature"
    dimensions: 3
    units: "K"

  field_2:
    standard_name: "specific_humidity"
    catchem_var: "MetState%SpecificHumidity"
    dimensions: 3
    units: "kg kg-1"

  field_3:
    standard_name: "air_pressure"
    catchem_var: "MetState%Pressure"
    dimensions: 3
    units: "Pa"

  field_4:
    standard_name: "eastward_wind"
    catchem_var: "MetState%U"
    dimensions: 3
    units: "m s-1"

  field_5:
    standard_name: "northward_wind"
    catchem_var: "MetState%V"
    dimensions: 3
    units: "m s-1"

  field_6:
    standard_name: "upward_air_velocity"
    catchem_var: "MetState%W"
    dimensions: 3
    units: "m s-1"
    optional: true

  field_7:
    standard_name: "atmosphere_boundary_layer_thickness"
    catchem_var: "MetState%PBL_Height"
    dimensions: 2
    units: "m"

  field_8:
