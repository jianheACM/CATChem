    dimensions: 2
    units: "W m-2"

  field_12:
    standard_name: "surface_upward_latent_heat_flux"
    catchem_var: "MetState%LatentHeatFlux"
    dimensions: 2
    units: "W m-2"

  field_13:
    standard_name: "friction_velocity"
    catchem_var: "MetState%FrictionVelocity"
    dimensions: 2
    units: "m s-1"

  field_14:
    standard_name: "land_binary_mask"
