# Example configuration for settling process
# Generated on: 2025-12-18T14:12:33.350626
# Author: Wei Li

process:
  name: "settling"
  version: "1.0.0"
  description: "Process for computing gravitational settling of aerosol species"
  active_scheme: ""
  is_active: true

  # Time stepping configuration
  dt_min: 1.0      # Minimum time step (seconds)
  dt_max: 3600.0   # Maximum time step (seconds)




# Scheme configurations
schemes:
  gocart:
    description: "GOCART gravitational settling scheme"
    author: "Wei Li"
    algorithm_type: "explicit"

    # Scheme-specific parameters
    parameters:
      scale_factor: 1.0  # settling velocity factor
      simple_scheme: False  # read in mie data for wet particles if true; otherwise calculate particles wet swelling internally
      swelling_method: 1  # method for calculating particle swelling: 1 Fitzgerald 1975; 2 for Gerber 1985
      correction_maring: False  # correct the settling velocity following Maring et al, 2003

    # Required meteorological fields for this scheme
    required_met_fields:
      - "T"
      - "TSTEP"
      - "AIRDEN"
      - "RH"
      - "Z"
      - "PMID"
      - "DELP"

    # Scheme-specific diagnostic configuration
    diagnostics:


# Diagnostic configuration
diagnostics:
  # Global diagnostic settings
  output_frequency: 3600.0  # seconds
  output_diagnostics: true

  # Individual diagnostic controls
  settling_velocity_per_species_per_level:
    description: "settling velocity per species per level"
    units: "m/s"
    output: true
  settling_flux_per_species:
    description: "settling flux per species across column"
    units: "kg/m2/s"
    output: true


# Performance and optimization settings
performance:
  parallelization: "column"
  memory_optimization: "low"
  vectorization: true


# Input/output configuration
io:
  # Input data sources
  input_data:

  # Output configuration
  output_data:
    base_directory: "/path/to/output"
    file_prefix: "settling_"
    compression: true

# Quality control and validation
quality_control:
  enable_bounds_checking: true
  enable_conservation_checks: false
  enable_mass_balance_checks: false

  # Value limits
  limits:

# Debugging and logging
debug:
  level: "info"  # debug, info, warning, error
  output_file: "settling_debug.log"
  flush_frequency: 100  # Flush log every N time steps

  # Debug-specific outputs
  debug_outputs:
    intermediate_variables: false
    conservation_diagnostics: false
    timing_information: true
