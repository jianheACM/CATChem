# Example configuration for wetdep process
# Generated on: 2025-12-15T16:30:33.974401
# Author: Wei Li

process:
  name: "wetdep"
  version: "1.0.0"
  description: "Process for computing wet deposition of gas and aerosol species"
  active_scheme: ""
  is_active: true

  # Time stepping configuration
  dt_min: 1.0      # Minimum time step (seconds)
  dt_max: 3600.0   # Maximum time step (seconds)




# Scheme configurations
schemes:
  jacob:
    description: "Jacob et al. [2000] wet deposition scheme"
    author: "Wei Li"
    algorithm_type: "explicit"

    # Scheme-specific parameters
    parameters:
      scale_factor: 1.0  # Washout tuning factor
      radius_threshold: 1.0  # Radius threshold for aerosol wet deposition (um)

    # Required meteorological fields for this scheme
    required_met_fields:
      - "T"
      - "TSTEP"
      - "AIRDEN_DRY"
      - "MAIRDEN"
      - "PFLLSAN"
      - "PFILSAN"
      - "PEDGE"
      - "REEVAPLS"

    # Scheme-specific diagnostic configuration
    diagnostics:


# Diagnostic configuration
diagnostics:
  # Global diagnostic settings
  output_frequency: 3600.0  # seconds
  output_diagnostics: true

  # Individual diagnostic controls
  wetdep_mass_per_species_per_level:
    description: "Wet deposition mass loss per species per level"
    units: "kg/m2"
    output: true
  wetdep_flux_per_species_per_level:
    description: "Wet deposition flux per species per level"
    units: "kg/m2/s"
    output: true


# Performance and optimization settings
performance:
  parallelization: "column"
  memory_optimization: "low"
  vectorization: true


# Input/output configuration
io:
  # Input data sources
  input_data:

  # Output configuration
  output_data:
    base_directory: "/path/to/output"
    file_prefix: "wetdep_"
    compression: true

# Quality control and validation
quality_control:
  enable_bounds_checking: true
  enable_conservation_checks: false
  enable_mass_balance_checks: false

  # Value limits
  limits:

# Debugging and logging
debug:
  level: "info"  # debug, info, warning, error
  output_file: "wetdep_debug.log"
  flush_frequency: 100  # Flush log every N time steps

  # Debug-specific outputs
  debug_outputs:
    intermediate_variables: false
    conservation_diagnostics: false
    timing_information: true
