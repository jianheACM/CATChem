# Example configuration for drydep process
# Generated on: 2025-11-25T22:20:02.567378
# Author: Wei Li

process:
  name: "drydep"
  version: "1.0.0"
  description: "Process for computing dry deposition of gas and aerosol species"
  active_scheme: ""
  is_active: true

  # Time stepping configuration
  dt_min: 1.0      # Minimum time step (seconds)
  dt_max: 3600.0   # Maximum time step (seconds)




# Scheme configurations
schemes:
  wesely:
    description: "Wesely 1989 gas dry deposition scheme"
    author: "Wei Li"
    algorithm_type: "explicit"

    # Scheme-specific parameters
    parameters:
      scale_factor: 1.0  # DryDep velocity scale factor
      co2_effect: True  # Apply CO2 effect on stomatal conductance
      co2_level: 600.0  # Ambient CO2 level for stomatal conductance adjustment
      co2_reference: 380.0  # Reference CO2 level for stomatal conductance adjustment

    # Required meteorological fields for this scheme
    required_met_fields:
      - "USTAR"
      - "TSTEP"
      - "TS"
      - "SWGDN"
      - "SUNCOSmid"
      - "OBK"
      - "CLDFRC"
      - "BXHEIGHT"
      - "Z0"
      - "PS"
      - "FRLAI"
      - "ILAND"
      - "SALINITY"
      - "FRLANDUSE"
      - "TSKIN"
      - "LON"
      - "LAT"
      - "LUCNAME"
      - "IsSnow"
      - "IsIce"
      - "IsLand"

    # Scheme-specific diagnostic configuration
    diagnostics:

  gocart:
    description: "GOCART-2G aerosol dry deposition scheme"
    author: "Wei Li & Lacey Holland"
    algorithm_type: "explicit"

    # Scheme-specific parameters
    parameters:
      scale_factor: 1.0  # Dry deposition velocity scale factor
      resuspension: False  # Apply resuspension for dry deposition

    # Required meteorological fields for this scheme
    required_met_fields:
      - "USTAR"
      - "TSTEP"
      - "T"
      - "AIRDEN"
      - "Z"
      - "LWI"
      - "PBLH"
      - "HFLUX"
      - "Z0H"
      - "U10M"
      - "V10M"
      - "FRLAKE"
      - "GWETTOP"

    # Scheme-specific diagnostic configuration
    diagnostics:

  zhang:
    description: "Zhang et al. [2001] scheme with Emerson et al. [2020] updates"
    author: "Wei Li"
    algorithm_type: "explicit"

    # Scheme-specific parameters
    parameters:
      scale_factor: 1.0  # Dry deposition velocity scale factor

    # Required meteorological fields for this scheme
    required_met_fields:
      - "USTAR"
      - "TSTEP"
      - "TS"
      - "OBK"
      - "BXHEIGHT"
      - "Z0"
      - "RH"
      - "PS"
      - "U10M"
      - "V10M"
      - "FRLANDUSE"
      - "ILAND"
      - "LUCNAME"
      - "IsSnow"
      - "IsIce"

    # Scheme-specific diagnostic configuration
    diagnostics:


# Diagnostic configuration
diagnostics:
  # Global diagnostic settings
  output_frequency: 3600.0  # seconds
  output_diagnostics: true

  # Individual diagnostic controls
  drydep_con_per_species:
    description: "Dry deposition concentration per species"
    units: "ug/kg or ppm"
    output: true
  drydep_velocity_per_species:
    description: "Dry deposition velocity"
    units: "m/s"
    output: true


# Performance and optimization settings
performance:
  parallelization: "column"
  memory_optimization: "low"
  vectorization: true


# Input/output configuration
io:
  # Input data sources
  input_data:

  # Output configuration
  output_data:
    base_directory: "/path/to/output"
    file_prefix: "drydep_"
    compression: true

# Quality control and validation
quality_control:
  enable_bounds_checking: true
  enable_conservation_checks: false
  enable_mass_balance_checks: false

  # Value limits
  limits:

# Debugging and logging
debug:
  level: "info"  # debug, info, warning, error
  output_file: "drydep_debug.log"
  flush_frequency: 100  # Flush log every N time steps

  # Debug-specific outputs
  debug_outputs:
    intermediate_variables: false
    conservation_diagnostics: false
    timing_information: true
