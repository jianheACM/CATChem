# Example configuration for seasalt process
# Generated on: 2025-08-26T11:29:44.453035
# Author: Barry Baker & Wei Li

process:
  name: "seasalt"
  version: "1.0.0"
  description: "Process for computing sea salt aerosol emissions over ocean surfaces"
  active_scheme: ""
  is_active: true

  # Time stepping configuration
  dt_min: 1.0      # Minimum time step (seconds)
  dt_max: 3600.0   # Maximum time step (seconds)




# Scheme configurations
schemes:
  gong97:
    description: "Gong 1997 sea salt emission scheme"
    author: "Barry Baker"
    algorithm_type: "explicit"

    # Scheme-specific parameters
    parameters:
      scale_factor: 1.0  # Emission scale factor
      weibull_flag: False  # Apply Weibull distribution for particle size

    # Required meteorological fields for this scheme
    required_met_fields:
      - "FROCEAN"
      - "FRSEAICE"
      - "SST"
      - "U10M"
      - "V10M"

    # Scheme-specific diagnostic configuration
    diagnostics:

  gong03:
    description: "Gong 2003 sea salt emission scheme with improved sub- and super-micron treatment"
    author: "Barry Baker"
    algorithm_type: "explicit"

    # Scheme-specific parameters
    parameters:
      scale_factor: 1.0  # Emission scale factor
      weibull_flag: False  # Apply Weibull distribution for particle size

    # Required meteorological fields for this scheme
    required_met_fields:
      - "FROCEAN"
      - "FRSEAICE"
      - "SST"
      - "U10M"
      - "V10M"

    # Scheme-specific diagnostic configuration
    diagnostics:

  geos12:
    description: "GEOS-Chem 2012 sea salt emission scheme with observational constraints"
    author: "Barry Baker"
    algorithm_type: "explicit"

    # Scheme-specific parameters
    parameters:
      scale_factor: 1.0  # Emission scale factor

    # Required meteorological fields for this scheme
    required_met_fields:
      - "FROCEAN"
      - "FRSEAICE"
      - "SST"
      - "USTAR"

    # Scheme-specific diagnostic configuration
    diagnostics:


# Diagnostic configuration
diagnostics:
  # Global diagnostic settings
  output_frequency: 3600.0  # seconds
  output_diagnostics: true

  # Individual diagnostic controls
  seasalt_mass_emission_total:
    description: "Sea salt mass emission flux total"
    units: "ug/m2/s"
    output: true
  seasalt_number_emission_total:
    description: "Sea salt number emission flux total"
    units: "#/m2/s"
    output: true

  # Emission tendency diagnostics
  emission_tendencies:
    output: true
    frequency: 3600.0  # seconds
    per_species: true  # Output tendency for each species

# Performance and optimization settings
performance:
  parallelization: "column"
  memory_optimization: "low"
  vectorization: true


# Input/output configuration
io:
  # Input data sources
  input_data:
    emission_inventory: "/path/to/emission/inventory.nc"
    spatial_allocation: "/path/to/spatial/factors.nc"
    temporal_allocation: "/path/to/temporal/factors.nc"

  # Output configuration
  output_data:
    base_directory: "/path/to/output"
    file_prefix: "seasalt_"
    compression: true

# Quality control and validation
quality_control:
  enable_bounds_checking: true
  enable_conservation_checks: false
  enable_mass_balance_checks: true

  # Value limits
  limits:
    max_emission_rate: 1.0e-3  # kg/m²/s
    min_emission_rate: 0.0

# Debugging and logging
debug:
  level: "info"  # debug, info, warning, error
  output_file: "seasalt_debug.log"
  flush_frequency: 100  # Flush log every N time steps

  # Debug-specific outputs
  debug_outputs:
    intermediate_variables: false
    conservation_diagnostics: false
    timing_information: true