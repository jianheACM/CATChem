name: GCC Linux Build and Test
on: [push, pull_request, workflow_dispatch]


# Use custom shell with -l so .bash_profile is sourced
# without having to do it in manually every step
defaults:
  run:
    shell: bash -leo pipefail {0}

env:
  cache_key: gcc
  CC: gcc-13
  FC: gfortran-13
  CXX: g++-13

# The jobs are split into:
# 1. a dependency build step (setup), and
# 2. a catchem build and test step (catchem)
# The setup is run once and the environment is cached,
# so each subsequent build and test of catchem can reuse the cached
# dependencies to save time (and compute).

jobs:
  setup:
    runs-on: ubuntu-24.04

    steps:
      - name: checkout  # this is to get the ci/spack.yaml file
        uses: actions/checkout@v3
        with:
            path: catchem

      # Cache spack, compiler and dependencies
      - name: cache-env
        id: cache-env
        uses: actions/cache@v3
        with:
          path: |
            spack
            ~/.spack
          key: spack-${{ runner.os }}-${{ env.cache_key }}-${{ hashFiles('catchem/ci/spack.yaml') }}

      # Install dependencies using Spack
      - name: install-dependencies-with-spack
        if: steps.cache-env.outputs.cache-hit != 'true'
        run: |
          git clone -c feature.manyFiles=true https://github.com/JCSDA/spack.git
          source spack/share/spack/setup-env.sh
          sed "s/\[oneapi, gcc@13:13, apple-clang@14\]/\[gcc@13:13\]/g" catchem/ci/spack.yaml > spack_ci.yaml
          spack env create catchem-env spack_ci.yaml
          spack env activate catchem-env
          sudo apt update
          sudo apt install -y cmake gfortran libgomp1
          spack external find
          # Ensure MPI with Fortran and OpenMP-capable toolchain
          spack add mpich@3.4.2 %gcc
          spack concretize
          spack install -v --fail-fast --dirty
          spack clean --all

  catchem:
    needs: setup
    runs-on: ubuntu-24.04

    steps:
      - name: checkout
        uses: actions/checkout@v3
        with:
            path: catchem
            submodules: recursive

      - name: cache-env
        id: cache-env
        uses: actions/cache@v3
        with:
          path: |
            spack
            ~/.spack
          key: spack-${{ runner.os }}-${{ env.cache_key }}-${{ hashFiles('catchem/ci/spack.yaml') }}
      - name: Ensure HTTPS and Git dependencies
        id: ensure-https-and-git
        run: |
          sudo apt-get update
          sudo apt-get install -y git ca-certificates libcurl4-openssl-dev
      - name: build
        run: |
          source spack/share/spack/setup-env.sh
          spack env activate catchem-env
          export CC=mpicc
          export FC=mpif90
          cd catchem
          mkdir -p build && cd build
          cmake -DCMAKE_INSTALL_PREFIX=../install -DBUILD_NUOPC=ON ..
          make -j2 VERBOSE=1
          make install

      - name: test
        run: |
          source spack/share/spack/setup-env.sh
          spack env activate catchem-env
          cd catchem/build
          ctest --output-on-failure
