### CATChem_species.yml: CATChem Runtime Species Configuration
###
### NOTE: Add quotes around nitrogen oxide ('NO'), because YAML
### parsers will confuse this with a negative "no" value.

# species (gas dey dep set to false to test GOCART only for now):
so2:
  name: so2
  description: Sulfur dioxide
  is_gas: true
  is_drydep: true
  is_wetdep: true
  dd_f0: 0.0
  dd_hstar: 1.0e+5
  mw_g: 64.04
  dd_DvzAerSnow: 0.03
  dd_DvzMinVal_snow: 0.2
  dd_DvzMinVal_land: 0.3
  viscosity: 0.0 #dummy value
  #This is Luo's scheme for SO2 but adopted here
  henry_k0: 1.22
  henry_cr: 3100.0
  wd_retfactor: 5.0e-2
  wd_LiqAndGas: true
  wd_convfacI2G: 6.17395e-1
  wd_rainouteff: [1.0, 0.0, 1.0]
