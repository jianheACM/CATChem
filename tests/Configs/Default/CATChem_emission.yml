anthro:
  NO:
    long_name: "Nitrogen Oxide"
    units: "kg/m2/s"
    scale: [1.0]
    map: ["NO"]   #double check upper or lower case
  SO2:
    long_name: "Sulfur Dioxide"
    units: "kg/m2/s"
    scale: [1.0]
    map: ["so2"]
  POC:
    long_name: "Primary Organic Carbon"
    units: "kg/m2/s"
    scale: [0.8, 0.2] #random fraction; need to look for real values
    map: ["oc1", "oc2"]
  PSO4:
    long_name: "Primary Sulfate"
    units: "kg/m2/s"
    scale: [1.0]
    map: ["aso4j"]    #will be changed to SO4 later

