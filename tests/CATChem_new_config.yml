### CATChem_config.yml: CATChem Runtime configuration options.
###
### NOTE: Add quotes around nitrogen oxide ('NO'), because YAML
### parsers will confuse this with a negative "no" value.

#============================================================================
# Simulation settings
#============================================================================
simulation:
  name: test
  start_date: 20240501 0000
  end_date: 20240501 0100
  #species_filename: ./Configs/Default/CATChem_species.yml
  #emission_filename: ./Configs/Default/CATChem_emission.yml
  species_filename: ./CATChem_species.yml
  emission_filename: ./CATChem_emission.yml
  verbose:
    activate: true
#============================================================================
# Grid settings
#============================================================================
grid:
  number_of_levels: 64
  number_of_soil_layers: 4
#============================================================================
# Timesteps settings
#============================================================================
timesteps:
  transport_timestep_in_s: 10
  chemistry_timestep_in_s: 60
#============================================================================
# Diagnostic settings
#============================================================================
diagnostics:
  output:
    enabled: true
    directory: "./output/diagnostics"
    prefix: "catchem_diag"
    frequency: 1  # timesteps
    format: "netcdf"
  collection:
    enabled: true
    buffer_size: 1000
#============================================================================
# RunPhase settings: define process running order
#============================================================================
run_phases:
  test1:
    description: "Test phase 1"
    processes:
      seasalt
  #     dust
  #     drydep
  # test2:
  #   description: "Test phase 2"
  #   processes:
  #     dust
  #     drydep
  #     #wetdep

#============================================================================
# Settings for CATChem processes
#============================================================================
processes:
  extemis:
    activate: true
    diagnostics: true
    global_factor: 1.0
    anthro:
      activate: true
      scale_factor: 1.0
      source_file: "anthro_emis.nc"
      format: "netcdf"
      gridded: true
      frequency: "hourly"
      diag_list: [NO, SO2, CO]
    point:
      activate: true
      scale_factor: 1.0
      topfraction: -1.0
      source_file: "point_emis.nc"
      format: "netcdf"
      gridded: false
      frequency: "hourly"
      lat_name: "LATITUDE"
      lon_name: "LONGITUDE"
      plume_rise: "sofiev"
      stack_diameter:    STKDM
      stack_height:      STKHT
      stack_temperature: STKTK
      stack_velocity:    STKVE
      diag_list: [NO, SO2, CO]
    fire:
      activate: true
      scale_factor: 1.0
      topfraction: -1.0
      source_file: "fire_emis.nc"
      format: "netcdf"
      gridded: true
      frequency: "hourly"
      plume_rise: "sofiev"
      diag_list: [NO, SO2, CO]
    fengsha:
      activate: true
      species: ["CLAYF", "SANDF", "DRAG", "UTHR"]
      units: ["1", "1", "1", "1"]
      scale_factor: [1.0, 1.0, 1.0, 1.0]
      source_file: "fengsha_emis.nc"
      format: "netcdf"
      gridded: true
      frequency: "static"
      diag_list: []
  seasalt:
    activate: true
    diagnostics: true
    scheme: 'geos12'
    gong97:
      scale_factor: 1.0
      weibull_flag: false
    gong03:
      scale_factor: 1.0
      weibull_flag: false
    geos12:
      scale_factor: 1.0
  dust:
    activate: true
    scheme_opt: 1
    dust_drag_opt: 1
    dust_moist_opt: 1
    dust_horizflux_opt: 1
    dust_alpha: 1.0
    dust_beta: 1.0
  drydep:
    activate: true
    scheme_opt: 1
    resuspension: false
