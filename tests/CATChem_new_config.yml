### CATChem_config.yml: CATChem Runtime configuration options.
###
### NOTE: Add quotes around nitrogen oxide ('NO'), because YAML
### parsers will confuse this with a negative "no" value.

#============================================================================
# Simulation settings
#============================================================================
simulation:
  name: test
  start_date: 20240501 0000
  end_date: 20240501 0100
  #species_filename: ./Configs/Default/CATChem_species.yml
  #emission_filename: ./Configs/Default/CATChem_emission.yml
  species_filename: ./CATChem_species.yml
  emission_filename: ./CATChem_emission.yml
  verbose:
    activate: true
#============================================================================
# Grid settings
#============================================================================
grid:
  number_of_levels: 64
  number_of_soil_layers: 4
#============================================================================
# Timesteps settings
#============================================================================
timesteps:
  transport_timestep_in_s: 10
  chemistry_timestep_in_s: 60
#============================================================================
# Diagnostic settings
#============================================================================
diagnostics:
  output:
    enabled: true
    directory: "./output/diagnostics"
    prefix: "catchem_diag"
    frequency: 1  # timesteps
    format: "netcdf"
  collection:
    enabled: true
    buffer_size: 1000
#============================================================================
# Optics files for Mie
#============================================================================
mie:
  #directory: "/gpfs/f6/bil-fire3/world-shared/Emissions/NASA/ExtData/monochromatic/"  #location on gaeac6
  directory: "../../../../../../optics/"
  files:
    # SS: opticsBands_SS.v3_3.RRTMG.nc
    # DU: opticsBands_DU.v15_3.RRTMG.nc
    # BC: opticsBands_BC.v1_3.RRTMG.nc
    # OC: opticsBands_OC.v1_3.RRTMG.nc
    # NI: opticsBands_NI.v2_5.RRTMG.nc
    # SU: opticsBands_SU.v1_3.RRTMG.nc
    SS: optics_SS.v3_5.nc
    DU: optics_DU.v15_5.nc
    BC: optics_BC.v1_5.nc
    OC: optics_OC.v1_5.nc
    NI: optics_NI.v2_5.nc
    SU: optics_SU.v1_5.nc
#============================================================================
# RunPhase settings: define process running order
#============================================================================
run_phases:
  test1:
    description: "Test phase 1"
    processes:
      seasalt
      #settling
      #drydep
      #wetdep
  # test2:
  #   description: "Test phase 2"
  #   processes:
  #     dust
  #     drydep
  #     #wetdep

#============================================================================
# Settings for CATChem processes
#============================================================================
processes:
  extemis:
    activate: true
    diagnostics: true
    global_factor: 1.0
    anthro:
      activate: true
      scale_factor: 1.0
      source_file: "INPUT/NEXUS_Expt.nc"
      format: "netcdf"
      gridded: true
      frequency: "hourly"
      diagnostics: true
      diag_list: [NO, SO2, CO]
    point:
      activate: true
      scale_factor: 1.0
      topfraction: -1.0
      source_file: "point_emis.nc"
      format: "netcdf"
      gridded: false
      frequency: "hourly"
      lat_name: "LATITUDE"
      lon_name: "LONGITUDE"
      plume_rise: "sofiev"
      stack_diameter:    STKDM
      stack_height:      STKHT
      stack_temperature: STKTK
      stack_velocity:    STKVE
      diagnostics: true
      diag_list: [NO, SO2, CO]
    fire:
      activate: true
      scale_factor: 1.0
      topfraction: -1.0
      source_file: "fire_emis.nc"
      format: "netcdf"
      gridded: true
      frequency: "hourly"
      plume_rise: "sofiev"
      diagnostics: true
      diag_list: [NO, SO2, CO]
    fengsha:
      activate: true
      species: ["CLAYF", "SANDF", "DRAG", "UTHR"]
      units: ["1", "1", "1", "1"]
      scale_factor: [1.0, 1.0, 1.0, 1.0]
      source_file: "fengsha_emis.nc"
      format: "netcdf"
      gridded: true
      frequency: "static"
      diagnostics: true
      diag_list: []
  seasalt:
    activate: true
    diagnostics: true
    diag_species: []
    scheme: 'geos12'
    gong97:
      scale_factor: 1.0
      weibull_flag: false
    gong03:
      scale_factor: 1.0
      weibull_flag: false
    geos12:
      scale_factor: 1.0
  dust:
    activate: true
    scheme_opt: 1
    dust_drag_opt: 1
    dust_moist_opt: 1
    dust_horizflux_opt: 1
    dust_alpha: 1.0
    dust_beta: 1.0
  drydep:
    activate: true
    diagnostics: true
    diag_species: [so2, aso4j, seas1, seas3, seas5]
    gas_scheme: 'wesely'
    aero_scheme: 'zhang'
    wesely:
      scale_factor: 1.0
    gocart:
      scale_factor: 1.0
      resuspension: false
    zhang:
      scale_factor: 1.0
  wetdep:
    activate: true
    diagnostics: true
    diag_species: [so2, aso4j, seas1, seas3, seas5]
    scheme: 'jacob'
    jacob:
      scale_factor: 1.0
      radius_threshold: 1.0
  settling:
    activate: true
    diagnostics: true
    diag_species: [aso4j, seas1, seas3, seas5]
    scheme: 'gocart'
    gocart:
      scale_factor: 1.0 #not doing anything for now since we cannot edit gocart2g module
      simple_scheme: false  #read in mie data for wet particles if true; otherwise calculate particles wet swelling internally
      swelling_method: 1    # 1 for Fitzgerald 1975; 2 for Gerber 1985 if simple_scheme is false
      correction_maring: false  #correction settling velocity following Maring et al, 2003 for both simple and non-simple schemes
